<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>낚시 매크로</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="responsive.css">
</head>
<body>

<header class="inner">
  <h1>먼바다 낚시 매크로</h1>
  <button id="toggleTheme">🌙 Dark</button>
</header>

<div class="filter-wrap inner">
  <div class="filter-group">
    <button class="chip active" data-type="all">전체</button>
    <button class="chip" data-type="squid">🦑 오징어</button>
  </div>

  <div class="filter-group">
    <button class="chip active" data-zone="all">전체</button>
    <button class="chip" data-zone="normal">기본</button>
    <button class="chip" data-zone="current">환해류</button>
  </div>
</div>

<main class="main">
  <div class="inner">
    <div class="container"></div>
  </div>
</main>

<footer class="footer">
  <p>
    낚시를 조금 더 편하게 하기 위해 만든 개인용 매크로 정리 페이지입니다.<br>
    <span class="nickname">동배기@초코보</span>
  </p>
</footer>

<script src="script.js"></script>
</body>
</html>
